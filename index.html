 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     
    <!-- Style Css -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwindcss daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
 </head>
 <body class="geist bg-gray-100">
    <!-- Navbar -->
     <nav class="navbar px-20 flex justify-between items-center bg-white shadow-xl">
        <div class="flex ">
            <div class="pr-2"><img class="w-9 h-9" src="./assets/github-logo.png" alt="github-logo"></div>
            <h2 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>

        <div class="flex ">
            <div class="relative w-11/12 pr-4">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input id="searchInput"
                class="w-full font-normal text-sm text-gray-950 py-2 pl-10 pr-4 border-base-300 rounded-sm border"
                placeholder="Search issue..."
                >
            </div>

            <button onclick="searchIssue()" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>Search
            </button>
        </div>
    </nav>
    <!-- issue btn bar-->
        <div class="px-64 py-14">
            <div class="bg-white p-5 rounded-xl shadow flex gap-3 w-full mb-6">
            <button onclick="filterAll(this)" class="tab-btn btn btn-sm btn-primary">All</button>
            <button onclick="filterOpen(this)" class="tab-btn btn btn-sm">Open</button>
            <button onclick="filterClosed(this)" class="tab-btn btn btn-sm">Closed</button>
            </div>
        </div>
    <!-- 50 Issues bar -->
    <div class="px-64 mt-6">
        <div class="bg-white p-5 rounded-xl shadow flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-purple-200 rounded-full flex items-center justify-center">
                <img src="./assets/Aperture.png" alt="Aperture">
                </div>
                <div>
                    <h3 class="font-semibold text-lg"><span id="issueCount">0</span>Issues</h3>
                    <p class="text-gray-400 text-sm">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-5 text-sm">
                <div  class=" flex items-center gap-2 cursor-pointer">
                    <div  class="w-3 h-3 bg-green-500 rounded-full"></div>
                    Open
                </div>
                <div  class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-purple-500 rounded-full cursor-pointer"></div>
                    Closed
                </div>
            </div>
        </div>
    </div>
    <!-- issuesContainer -->
    <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-5 py-6 px-64"></div>
    <!-- loading area -->
    <div id="loading" class="text-center pb-96 hidden">
    <span class="loading loading-bars loading-xl"></span>
    </div>
    <!-- Issue info pop up -->
    <div id="issueModal" class="fixed inset-0 bg-black/50 hidden justify-center items-center z-50">
        <div class="bg-white rounded-md shadow-xl w-[500px] p-6">
            <h2 id="modalTitle" class="text-3xl font-bold pb-2"></h2>
            <div class="flex gap-3 items-center text-sm pb-3">
                <span id="modalStatus" class="px-3 py-1 rounded-full text-green-100 bg-green-700"></span>
                <i class="fa-solid fa-circle" style="font-size: 5px"></i><span id="modalAuthor" class="text-gray-500"></span>
                <i class="fa-solid fa-circle" style="font-size: 5px"></i><span id="modalDate" class="text-gray-500"></span>
            </div>
            <div class="flex pb-4 gap-3">
                <span id="modalLabel" class="bg-yellow-300 text-yellow-700 px-3 py-1 rounded-full text-xs"></span>
            </div>
            <p id="modalDescription" class="text-gray-600 pb-4"></p>
            <div class="bg-gray-100 p-4 rounded flex justify-between mb-4">
                <div>
                    <p class="text-sm text-gray-600">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold"></p>
                </div>
                <div class="items-center">
                    <p class="text-sm text-gray-600">Priority:</p>
                    <span id="modalPriority" class="bg-red-500 text-white px-4 py-1 rounded-full text-xs"></span>
                </div>
            </div>
            <div class="flex justify-end pt-3">
                <button onclick="closeModal()" class="btn btn-primary">Close</button>
            </div>
        </div>
    </div>
    <!-- script area -->
    <script src="script.js"></script>
    
 </body>
 </html>
